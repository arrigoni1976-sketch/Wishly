<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#4A7A50"/>

  <!-- Bow left lobe -->
  <ellipse cx="36" cy="37" rx="10.5" ry="10" fill="#F5EDE3"/>
  <!-- Bow right lobe -->
  <ellipse cx="64" cy="37" rx="10.5" ry="10" fill="#F5EDE3"/>
  <!-- Bow centre knot -->
  <ellipse cx="50" cy="39" rx="4.8" ry="4.5" fill="#F5EDE3"/>

  <!-- Lid -->
  <rect x="17" y="40" width="66" height="11" rx="1.5" fill="#D4A090"/>
  <!-- Ribbon strip on lid -->
  <rect x="47" y="40" width="6" height="11" fill="#F5EDE3" opacity="0.88"/>

  <!-- Box body -->
  <rect x="19" y="50" width="62" height="29" rx="2" fill="#ECC4B4"/>

  <!-- Dots -->
  <circle cx="32" cy="63" r="1.2" fill="#D4A090" opacity="0.45"/>
  <circle cx="68" cy="60" r="1" fill="#D4A090" opacity="0.4"/>
  <circle cx="73" cy="70" r="0.9" fill="#D4A090" opacity="0.35"/>
</svg>
