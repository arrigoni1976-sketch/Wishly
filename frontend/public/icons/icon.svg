  <!-- Bow right lobe -->
  <ellipse cx="336" cy="198" rx="72" ry="62" fill="#FAF7F2"/>
  <!-- Bow centre knot -->
  <ellipse cx="256" cy="207" rx="34" ry="30" fill="#FAF7F2"/>
  <!-- Decorative dots on body -->
  <circle cx="162" cy="346" r="7" fill="#FAF7F2" opacity="0.4"/>
  <circle cx="348" cy="378" r="6" fill="#FAF7F2" opacity="0.4"/>
  <circle cx="378" cy="318" r="5" fill="#FAF7F2" opacity="0.35"/>
